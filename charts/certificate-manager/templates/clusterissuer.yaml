apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production-classic
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    profile: tlsserver
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
    - dns01:
        route53:
          region: {{ .Values.region }}
          role: {{ .Values.roleArn }} 
          auth:
            kubernetes:
              serviceAccountRef:
                name: cert-manager
