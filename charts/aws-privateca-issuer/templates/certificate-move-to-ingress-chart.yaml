{{/* {{- range .Values.ingresscontroller }} */}}
## move this into the openshift-ingress chart
kind: Certificate
apiVersion: cert-manager.io/v1
metadata:
  name: {{ .Values.clustername }}.{{ .Values.domain }}
  #name: {{ .clustername }}.{{ .domain }}
  namespace: openshift-ingress
spec:
  commonName: {{ .Values.clustername }}.{{ .Values.domain }}
  #name: {{ .clustername }}.{{ .domain }}
  dnsNames:
    - "*.{{ .Values.clustername }}.{{ .Values.domain }}"
    #- "*.{{ .clustername }}.{{ .domain }}"
  duration: 2160h0m0s
  issuerRef:
    group: awspca.cert-manager.io
    kind: AWSPCAClusterIssuer
    name: {{ .Values.clustername }}.{{ .Values.domain }}
  #name: {{ .clustername }}.{{ .domain }}
  renewBefore: 360h0m0s
  secretName: ingresscontroller-{{ .Values.name }}-certificate
  #secretName: ingresscontroller-{{ .name }}-certificate
  usages:
    - "server auth"
    - "client auth"
  privateKey:
    algorithm: "RSA"
    size: 2048
{{/* {{- end }} */}}

