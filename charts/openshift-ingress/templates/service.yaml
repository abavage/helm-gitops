{{- $controllers := .Values.ingresscontroller }}
{{- if .Values.infrastructure }}
{{- range .Values.infrastructure }}
{{- if eq .chart "openshift-ingress" }}
{{- if .values.ingresscontroller }}
{{- $controllers = .values.ingresscontroller }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- range $controllers }}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: router
    ingresscontroller.operator.openshift.io/owning-ingresscontroller: {{ .name }}
    router: router-{{ .name }}
  name: router-{{ .name }}
  namespace: openshift-ingress
spec:
  externalTrafficPolicy: Local
  ports:
  - name: httphealth
    port: 1936
    protocol: TCP
    targetPort: 1936
  - name: http
    port: 80
    targetPort: http
  - name: https
    port: 443
    targetPort: https
  selector:
    ingresscontroller.operator.openshift.io/deployment-ingresscontroller: {{ .name }}
  type: LoadBalancer
{{- end }}
