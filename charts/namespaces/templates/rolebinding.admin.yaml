apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.namespace }}-admin
  namespace: {{ .Values.namespace }}
  labels:
    {{ .Values.custom_label.key }}: {{ .Values.custom_label.value }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin
subjects:
- apiGroup: rbac.authorization.k8s.io 
  kind: Group
  name: {{ .Values.admin_active_directory_group }}